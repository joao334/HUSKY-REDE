<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FotoRede</title>
    <link rel="icon" href="/assets/logo.svg" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="/assets/logo.svg" alt="FotoRede">
          <h1>FotoRede</h1>
          <p>Carregando sua rede social...</p>
        </div>
      </div>
    </main>
    <script type="module">
      import { supabase } from './js/supabase.js';
      if (supabase) {
        const { data } = await supabase.auth.getSession();
        location.replace(data.session ? '/home.html' : '/login.html');
      } else {
        location.replace('/login.html');
      }
    </script>
  </body>
</html>
